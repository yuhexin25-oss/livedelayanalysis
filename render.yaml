services:
  - type: web
    name: livedelayanalysis-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: FLIGHTAWARE_API_KEY
        sync: false
    autoDeployTrigger: commit
    previews:
      generation: 'off'
