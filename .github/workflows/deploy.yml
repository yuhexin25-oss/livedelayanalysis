name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: https://livedelayanalysis-backend.onrender.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Force GitHub Pages to use Actions deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -L --silent --show-error \
            -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"build_type":"workflow"}' \
            --output /tmp/pages-response.json \
            --write-out "%{http_code}" > /tmp/pages-status.txt
          status="$(cat /tmp/pages-status.txt)"
          if [ "$status" -ge 200 ] && [ "$status" -lt 300 ]; then
            echo "GitHub Pages source is configured for Actions deployments."
          else
            echo "::warning::Could not update GitHub Pages source automatically. In Settings > Pages, set Source to GitHub Actions."
            cat /tmp/pages-response.json
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend build
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
